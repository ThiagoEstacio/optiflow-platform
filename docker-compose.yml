version: '3.8'

# OptiFlow Platform — docker-compose
#
# Módulos:
#   Connect   (8080) — gateway multi-protocolo: OPC UA, Modbus, MQTT, S7, EtherNet/IP
#   Historian (8100) — historiador de séries temporais com compressão SDT (PI-equivalente)
#   Context   (8200) — hierarquia de ativos ISA-95 e ontologia
#   Vision    (5173) — dashboard operacional React
#   Backend   (8000) — API PIMS (legado / integração OPERA)
#
# Infraestrutura:
#   TimescaleDB (5433) — Historian + Context
#   Redis       (6379) — barramento Redis Streams
#   RabbitMQ    (5672) — Celery broker
#   Mosquitto   (1883) — MQTT broker para SimPublisher
#   Prometheus  (9090) — métricas
#   Grafana     (3000) — dashboards de observabilidade

x-redis-url: &redis-url
  REDIS_URL: "redis://:optiflow_redis@redis:6379/1"

x-influx-vars: &influx-vars
  INFLUX_URL:    "http://influxdb:8086"
  INFLUX_TOKEN:  "optiflow-influx-token"
  INFLUX_ORG:    "optiflow"
  INFLUX_BUCKET: "timeseries"

x-timescale-url: &timescale-url
  TIMESCALE_URL: "postgresql+asyncpg://historian:historian@timescaledb:5432/optiflow_historian"

services:

  # ── Infraestrutura ──────────────────────────────────────────────────────────

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: optiflow-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB:       optiflow_historian
      POSTGRES_USER:     historian
      POSTGRES_PASSWORD: historian
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - optiflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U historian -d optiflow_historian"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: optiflow-postgres
    environment:
      POSTGRES_DB:       optiflow
      POSTGRES_USER:     optiflow
      POSTGRES_PASSWORD: optiflow_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - optiflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optiflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7-alpine
    container_name: optiflow-influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE:         setup
      DOCKER_INFLUXDB_INIT_USERNAME:     admin
      DOCKER_INFLUXDB_INIT_PASSWORD:     adminpassword
      DOCKER_INFLUXDB_INIT_ORG:          optiflow
      DOCKER_INFLUXDB_INIT_BUCKET:       timeseries
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN:  optiflow-influx-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    ports:
      - "8086:8086"
    networks:
      - optiflow-network
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: optiflow-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass optiflow_redis
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6381:6379"
    networks:
      - optiflow-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "optiflow_redis", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: optiflow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: optiflow
      RABBITMQ_DEFAULT_PASS: optiflow_password
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - optiflow-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: optiflow-mosquitto
    restart: unless-stopped
    volumes:
      - ./config/mosquitto:/mosquitto/config
      - mosquitto_data:/mosquitto/data
    ports:
      - "1883:1883"
      - "9001:9001"
    networks:
      - optiflow-network

  # ── Connect — gateway multi-protocolo ─────────────────────────────────────

  gateway:
    build:
      context: ./connect
      dockerfile: Dockerfile
    container_name: optiflow-gateway
    command: python -m app.main
    volumes:
      - ./connect:/app
      - gateway_data:/app/data
    ports:
      - "8080:8080"
    environment:
      <<: *redis-url
      GATEWAY_ID:   "optiflow-gateway-01"
      DEVICES_DB:   "/app/data/devices.db"
      MGMT_PORT:    "8080"
      LOG_LEVEL:    "INFO"
      # Channel model (KEPServer-style): 1 conexão : N tags via wildcard.
      MQTT_CHANNEL_ENABLED: "1"
      MQTT_CHANNEL_HOST:    "mosquitto"
      MQTT_CHANNEL_PORT:    "1883"
      # Para HA horizontal: troque por "$$share/optiflow-ingest/optiflow/#"
      # (shared subscription MQTT5) e rode N réplicas do gateway dividindo a carga.
      MQTT_CHANNEL_TOPIC:   "optiflow/#"
    networks:
      - optiflow-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      # Frescura, não só existência: o arquivo só é mantido fresco enquanto o
      # gateway publica (ver _health_loop). Parou de publicar -> mtime envelhece
      # -> unhealthy. Acaba com o "verde mentiroso".
      test: ["CMD", "python", "-c",
             "import os,time; p='/app/data/gateway.health'; exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p) < 90 else 1)"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  sim-publisher:
    profiles: [sim]
    build:
      context: ./connect
      dockerfile: Dockerfile
    container_name: optiflow-sim-publisher
    command: python -m app.services.sim_mqtt_publisher
    volumes:
      - ./connect:/app
    environment:
      MQTT_HOST:          mosquitto
      MQTT_PORT:          "1883"
      GATEWAY_API:        "http://gateway:8080"
      TOPIC_PREFIX:       optiflow
      PUBLISH_INTERVAL_S: "2.0"
      LOG_LEVEL:          INFO
    networks:
      - optiflow-network
    depends_on:
      mosquitto:
        condition: service_started
      gateway:
        condition: service_healthy
    restart: unless-stopped

  # ── Context — hierarquia de ativos, ontologia, relações ─────────────────────

  context:
    build:
      context: ./context
      dockerfile: Dockerfile
    container_name: optiflow-context
    ports:
      - "8200:8200"
    environment:
      <<: *timescale-url
      GATEWAY_URL: "http://gateway:8080"
      LOG_LEVEL:   "INFO"
    networks:
      - optiflow-network
    depends_on:
      timescaledb:
        condition: service_healthy
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8200/health',timeout=4); sys.exit(0 if b'healthy' in r.read() else 1)"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 4
    restart: unless-stopped

  # ── Historian — séries temporais com compressão PI-equivalente ───────────────

  historian:
    build:
      context: ./historian
      dockerfile: Dockerfile
    container_name: optiflow-historian
    volumes:
      - historian_parquet:/data/parquet
    ports:
      - "8100:8100"
    environment:
      TIMESCALE_URL: "postgresql+asyncpg://historian:historian@timescaledb:5432/optiflow_historian"
      REDIS_URL: "redis://:optiflow_redis@redis:6379/1"
      DEFAULT_SDT_DEVIATION: "0.5"
      DEFAULT_DEADBAND: "0.0"
      HOT_RETENTION_DAYS: "365"
      COMPRESS_AFTER_DAYS: "7"
      PARQUET_OUTPUT_DIR: "/data/parquet"
      LOG_LEVEL: "INFO"
    networks:
      - optiflow-network
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8100/health',timeout=4); sys.exit(0 if b'healthy' in r.read() else 1)"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 4
    restart: unless-stopped
  # ── Vision — dashboard operacional ──────────────────────────────────────────

  vision:
    build:
      context: ./vision
      dockerfile: Dockerfile
      target: builder
    container_name: optiflow-vision
    command: npm run dev -- --host
    volumes:
      - ./vision:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL:       "http://localhost:8000"
      VITE_WS_URL:        "ws://localhost:8000"
      VITE_GATEWAY_URL:   "http://localhost:8080"
      VITE_HISTORIAN_URL: "http://localhost:8100"
      VITE_CONTEXT_URL:   "http://localhost:8200"
    networks:
      - optiflow-network
    depends_on:
      - backend
      - historian
      - context

  # ── Backend API (PIMS / integração OPERA) ──────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: optiflow-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - backend_mlflow:/app/mlruns
    ports:
      - "8000:8000"
    environment:
      APP_NAME:    "OptiFlow AI Platform"
      ENVIRONMENT: development
      DEBUG:       "true"
      SECRET_KEY:  dev-secret-key-change-in-production
      DATABASE_URL: "postgresql+asyncpg://optiflow:optiflow_password@postgres:5432/optiflow"
      <<: *influx-vars
      REDIS_URL:            "redis://:optiflow_redis@redis:6379/0"
      CELERY_BROKER_URL:    "amqp://optiflow:optiflow_password@rabbitmq:5672/"
      CELERY_RESULT_BACKEND: "redis://:optiflow_redis@redis:6379/4"
      GATEWAY_BUS_REDIS_URL:  "redis://:optiflow_redis@redis:6379/1"
      GATEWAY_BUS_ENABLED:    "true"
      JWT_SECRET_KEY:               jwt-secret-key-change-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES:  "15"
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
      OPTIFLOW_CONTEXT_URL:  "http://context:8200"
      OPTIFLOW_HISTORIAN_URL: "http://historian:8100"
    networks:
      - optiflow-network
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      gateway:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: optiflow-celery-worker
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
      - backend_mlflow:/app/mlruns
    environment:
      DATABASE_URL:         "postgresql+asyncpg://optiflow:optiflow_password@postgres:5432/optiflow"
      CELERY_BROKER_URL:    "amqp://optiflow:optiflow_password@rabbitmq:5672/"
      CELERY_RESULT_BACKEND: "redis://:optiflow_redis@redis:6379/4"
      <<: *influx-vars
    networks:
      - optiflow-network
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - backend
    restart: unless-stopped

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: optiflow-celery-beat
    command: celery -A app.tasks.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      CELERY_BROKER_URL:    "amqp://optiflow:optiflow_password@rabbitmq:5672/"
      CELERY_RESULT_BACKEND: "redis://:optiflow_redis@redis:6379/4"
    networks:
      - optiflow-network
    depends_on:
      - rabbitmq
      - redis
      - backend
    restart: unless-stopped

  # ── Analytics & Observabilidade ──────────────────────────────────────────────

  mlflow:
    image: python:3.11-slim
    container_name: optiflow-mlflow
    command: >
      sh -c "pip install --quiet mlflow psycopg2-binary &&
             mlflow server
               --backend-store-uri postgresql://optiflow:optiflow_password@postgres:5432/optiflow
               --default-artifact-root /mlflow/artifacts
               --host 0.0.0.0 --port 5000"
    volumes:
      - backend_mlflow:/mlflow
    ports:
      - "5000:5000"
    networks:
      - optiflow-network
    depends_on:
      - postgres
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: optiflow-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - optiflow-network

  grafana:
    image: grafana/grafana:latest
    container_name: optiflow-grafana
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS:         grafana-clock-panel,grafana-worldmap-panel
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - optiflow-network
    depends_on:
      - prometheus
      - influxdb

networks:
  optiflow-network:
    driver: bridge

volumes:
  postgres_data:
  timescaledb_data:
  influxdb_data:
  influxdb_config:
  redis_data:
  rabbitmq_data:
  mosquitto_data:
  backend_mlflow:
  gateway_data:
  historian_parquet:
  prometheus_data:
  grafana_data:
